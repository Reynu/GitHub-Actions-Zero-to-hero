name: DevSecOps Pipeline

on:
    push:
        branches: [main]

jobs:
    # CI ( Continuous Integration with Secruity Scanning )
    
    code-quality:
        uses: ./.github/workflows/code-quality.yml

    secrets-scan:
        uses: ./.github/workflows/secrets-scan.yml
        
    dependency-scan:
        uses: ./.github/workflows/dependency-scan.yml
        
    docker-lint:
        uses: ./.github/workflows/docker-lint.yml
        
    # Build once the security scans and tests are complete
    
    build-and-push:
        needs: [code-quality, secrets-scan, dependency-scan, docker-lint]
        uses: ./.github/workflows/docker-build-push.yml
        secrets: inherit

     # Image scan 
    image-scan:
        needs: [build-and-push]
        uses: ./.github/workflows/image-scan.yml
        secrets: inherit

    # CD : Deploy to Production     
    deploy-to-server:   
        needs: [image-scan]
        uses: ./.github/workflows/deploy-app.yml
        secrets: inherit 