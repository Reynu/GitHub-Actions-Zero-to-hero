# this will deploy the safe / secure / tested app to the prod server

name: Deploy to Server

on:
    workflow_call:
        secrets:
            SSH_PRIVATE_KEY:
                required: true
            DOCKER_TOKEN:
                required: true


jobs:
    deploy-to-server:
        runs-on: ubuntu-latest
        env:
            DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
            DOCKER_TAG: ${{ github.sha }}
        
        steps:
            - name: checkout code
              uses: actions/checkout@v4


            - name: SSH to prod server and create app folder and install required packages
              uses: appleboy/ssh-action@v1.2.5
              with:
                host: ${{ vars.SSH_HOST }}
                username: ${{ vars.SSH_USER }}
                key: ${{ secrets.SSH_PRIVATE_KEY }}
                port: 22
                script: |
                    echo "Installing required packages & folders"
                    mkdir -p ~/app
                    cd ~/app
                    sudo apt update -y
                    sudo apt install docker.io && sudo apt install docker-compose-v2 -y
                    sudo usermod -aG docker $USER

            - name: Verify docker compose file exists
              run: ls -la Docker-compose.yml

            - name: Copy docker-compose file to prod server
              uses: appleboy/scp-action@v1.0.0
              with:
                host: ${{ vars.SSH_HOST }}
                username: ${{ vars.SSH_USER }}
                key: ${{ secrets.SSH_PRIVATE_KEY }}
                port: 22
                source: ./Docker-compose.yml
                target: ~/app
                
            - name: SSH to prod server & run the app using docker compose
              uses: appleboy/ssh-action@v1.2.5
              with:
                host: ${{ vars.SSH_HOST }}
                username: ${{ vars.SSH_USER }}
                key: ${{ secrets.SSH_PRIVATE_KEY }}
                port: 22
                script: |
                    echo "Running App"
                
                    export DOCKERHUB_USERNAME=${{ vars.DOCKERHUB_USERNAME }}
                    export DOCKER_TAG=${{ github.sha }}
                    echo "${{ secrets.DOCKER_TOKEN }}" | docker login --username "${{ vars.DOCKERHUB_USERNAME }}" --password-stdin
                    cd ~/app
                    docker compose -f Docker-compose.yml down
                    docker compose -f Docker-compose.yml up -d --build --force-recreate --pull always
