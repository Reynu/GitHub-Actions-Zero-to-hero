# this will deploy the safe / secure / tested app to the prod server

name: Deploy to Server

on:
    workflow_call:
        secrets:
            SSH_PRIVATE_KEY:
                required: true

jobs:
    deploy-to-server:
        runs-on: ubuntu-latest
        
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: Validate SSH private key
              env:
                SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
              run: |
                if [ -z "$SSH_PRIVATE_KEY" ]; then
                  echo "::error::SSH_PRIVATE_KEY secret is empty or not available to this workflow"
                  exit 1
                fi
                if ! printf '%s\n' "$SSH_PRIVATE_KEY" | head -n 1 | grep -Eq '^-----BEGIN (OPENSSH|RSA|EC|DSA) PRIVATE KEY-----$'; then
                  echo "::error::SSH_PRIVATE_KEY is not a valid private key. Add the full private key, including BEGIN/END lines."
                  exit 1
                fi

            - name: SSH to prod server and create app folder and install required packages
              uses: appleboy/ssh-action@v1.2.0
              with:
                host: ${{ vars.SSH_HOST }}
                username: ${{ vars.SSH_USER }}
                key: ${{ secrets.SSH_PRIVATE_KEY }}
                script: |
                    echo "Installing required packages & folders"
                    mkdir -p /app
                    cd /app
                    sudo apt update -y
                    sudo apt install docker.io docker-compose-v2 -y
                    sudo usermod -aG docker $USER

            - name: Copy docker-compose file to prod server
              uses: appleboy/scp-action@v0.1.7
              with:
                host: ${{ vars.SSH_HOST }}
                username: ${{ vars.SSH_USER }}
                key: ${{ secrets.SSH_PRIVATE_KEY }}
                source: "Docker-compose.yml"
                target: "/app/Docker-compose.yml"
                
            - name: SSH to prod server & run the app using docker compose
              uses: appleboy/ssh-action@v1.2.0
              with:
                host: ${{ vars.SSH_HOST }}
                username: ${{ vars.SSH_USER }}
                key: ${{ secrets.SSH_PRIVATE_KEY }}
                script: |
                    echo "Deploying the app using docker compose"
                    cd /app
                    docker compose down && docker compose up -d --build --force-recreate --pull always    
