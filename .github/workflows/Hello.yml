# this is workflow name
name: Hello workflow

# runs on an automatic trigger, whenever changes are pushed to branch (deployment)
on:
  push:
   branches: [main]

# these are jobs inside the workflow
jobs:
  # this is the name of the job 1
  greet:

      # this is the github runner, each job runs on a runner
    runs-on: ubuntu-latest 
    steps:
       - name: say hello to users
         run: echo "HELLO DOSTO"

       - name: say hello to username
         run: echo "Hello $USER"

  # this is the name of the job 2
  details:
     runs-on: ubuntu-latest
     steps:
       - name: version of python, docker etc
         run: python --version && docker --version

    
