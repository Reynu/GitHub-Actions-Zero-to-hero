name: Deploy App

on:
  push:
    branches: [main]

jobs:  
   deploy:
     runs-on: self-hosted
     steps:
         - name: checkout code
           uses: actions/checkout@v4
           
         - name: Set up Docker Compose
           uses: docker/setup-compose-action@v2

         - name: Deploy with Docker Compose
           run: docker compose run -d  --build --forece-recreate 