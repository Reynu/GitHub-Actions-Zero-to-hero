name: Docker Build and push

on:
  push:
    branches: [main]

jobs:
  build-and-push:
     runs-on: ubuntu-latest

     steps:
       - name: checkout code
         uses: actions/checkout@v4

       - name: login to docker hub
         uses: docker/login-actions@v4
         with:
           username: ${{ vars.DOCKER_USERNAME }}
           password: ${{ secrets.DOCKER_TOKEN }}

       - name: build and push docker image
         uses: actions/build-push-actions@v4
         with:
           context: .
           push: true
           tags: |
              ${{ vars.DOCKER_USERNAME }}/github-actions-app:latest }}
              ${{ vars.DOCKER_USERNAME }}/github-actions-app:${{ github.sha }}
              ${{ vars.DOCKER_USERNAME }}/github-actions-app:${{ github.ref_name }}        